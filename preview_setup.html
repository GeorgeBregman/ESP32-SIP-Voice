<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 SIP Setup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    border: 1px solid rgba(255, 255, 255, 0.18);
    width: 100%;
    max-width: 320px;
    animation: fadeIn 0.8s ease-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
h1 {
    text-align: center;
    margin-top: 0;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
}
.form-group {
    margin-bottom: 16px;
}
label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: #ccc;
}
input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    font-size: 15px;
    box-sizing: border-box;
    transition: all 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}
input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.15);
    border-color: #00d2ff;
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
}
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
}
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
}
.btn:active {
    transform: translateY(0);
}
</style>
</head>
<body>
<div class="card">
    <h1>ESP32 SIP Setup</h1>
    <form method="POST" action="/setup">
        <div class="form-group"><label>WiFi SSID</label><input type="text" name="ssid" value="MyHomeNetwork"></div>
        <div class="form-group"><label>WiFi Password</label><input type="password" name="pass" value="12345678"></div>
        <div class="form-group"><label>SIP Server IP/Domain</label><input type="text" name="sip_server" value="sip.antisip.com"></div>
        <div class="form-group"><label>SIP Username</label><input type="text" name="sip_user" value="doorbell_1"></div>
        <div class="form-group"><label>SIP Password</label><input type="password" name="sip_pass" value="secret"></div>
        <button type="submit" class="btn">Save & Restart</button>
    </form>
</div>
</body>
</html>
